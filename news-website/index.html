<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Breaking News</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="news-container">
        <!-- News articles will be loaded here by JavaScript -->
        <h2>Latest Articles</h2>
        <section class="article-list">
            <article class="news-article">
                <h3><a href="#">Article Title 1</a></h3>
                <p class="summary">This is a short summary of the first news article...</p>
                <span class="date">October 26, 2023</span>
            </article>
            <article class="news-article">
                <h3><a href="#">Article Title 2</a></h3>
                <p class="summary">This is a short summary of the second news article...</p>
                <span class="date">October 26, 2023</span>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 News Website</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
